<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Ulti-mates – Manette</title>

  <!-- ── TYPOGRAPHIES UI ── -->
  <!-- Boldonse est chargé localement via controller.css -->

  <link rel="stylesheet" href="controller.css">
</head>

<body>

  <!-- Bouton Fullscreen -->
  <button id="fullscreen-btn"
    onclick="document.documentElement.requestFullscreen && document.documentElement.requestFullscreen()">⛶</button>

  <!-- Portrait Overlay (CSS-driven) -->
  <div id="portrait-overlay">
    <img src="Img/Tipolino Logo.svg" alt="Tipolino Logo" class="rotate-logo">
    <img src="Img/Icon Rotate Phone.svg" alt="Rotate Phone" class="rotate-icon">
    <h3>Tournez votre téléphone en mode paysage</h3>
  </div>

  <!-- Logo et statut masqués -->
  <div class="status disconnected" id="status" style="display: none;">Connexion…</div>

  <!-- ÉCRAN 1 : PSEUDO -->
  <div id="login-screen">
    <img src="Img/Tipolino%20Logo.svg" alt="Tipolino Logo" id="login-logo">
    <input type="text" id="pseudo-input" placeholder="Ton pseudo" maxlength="16" autocomplete="off">
    <button class="btn-primary" id="pseudo-btn">Continuer</button>
  </div>

  <!-- ÉCRAN 2 : ÉQUIPE -->
  <div id="team-screen">
    <h3 id="hello-pseudo">Hello pseudo</h3>
    <h2>Choisis ton équipe</h2>
    <div class="team-btns">
      <button class="btn-team" id="btn-team-a">PIZZAIOLOS</button>
      <button class="btn-team" id="btn-team-b">CLIENTS</button>
    </div>
  </div>

  <!-- ÉCRAN 3 : LOBBY -->
  <div id="lobby-screen">
    <h3 id="lobby-player-count">0 joueur(s) connecté(s)</h3>

    <div class="lobby-layout">
      <!-- Tableaux -->
      <div class="lobby-tables">
        <div class="lobby-col">
          <div class="lobby-header">PIZZAIOLOS</div>
          <div class="lobby-list-container">
            <div id="lobby-list-a" class="lobby-list">
              <div class="lobby-empty">—</div>
            </div>
          </div>
        </div>
        <div class="lobby-col">
          <div class="lobby-header">CLIENTS</div>
          <div class="lobby-list-container">
            <div id="lobby-list-b" class="lobby-list">
              <div class="lobby-empty">—</div>
            </div>
          </div>
        </div>
      </div>

      <!-- Bouton Play -->
      <div id="start-btn-wrapper" style="display: none;">
        <button id="start-game-btn" class="btn-play">
          <img src="Img/Play.svg" alt="Play">
        </button>
      </div>
    </div>
  </div>

  <!-- ÉCRAN 4 : CONTRÔLES (Format Paysage) -->
  <div id="control-screen">

    <!-- JOYSTICK -->
    <div id="joystick-zone">
      <div id="joystick-knob"></div>
    </div>

    <!-- BOUTON CONTEXTUEL UNIQUE -->
    <button id="action-btn" class="mode-push">
      <img class="btn-icon icon-throw" src="Img/iconlancer.svg" alt="Lancer">
      <img class="btn-icon icon-push" src="Img/HandFist.svg" alt="Pousser">
      <span class="btn-label">Pousser</span>
    </button>

    <!-- Éléments cachés (utilisés par JS) -->
    <div id="grab-feedback" style="display:none;">🤝 Tu es attrapé !</div>
    <div id="action-status" style="display:none;"></div>
    <div id="player-name" style="display:none;"></div>
  </div>

  <!-- Rotation Screen -->
  <div id="rotate-overlay">
    <span>📱⟲</span>
    <p style="margin-top: 10px;">Veuillez tourner votre téléphone en mode paysage pour jouer !</p>
    <button id="force-landscape-btn">Ma rotation est bloquée (Jouer quand même)</button>
  </div>

  <!-- Overlay étourdi -->
  <div id="stun-overlay">
    <span>😵</span><span>ÉTOURDI !</span>
  </div>

  <script src="controller.js"></script>
</body>

</html>
