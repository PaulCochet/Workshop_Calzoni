<head>
  <meta charset="UTF-8">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0f0f1a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Segoe UI', sans-serif;
      color: white;
    }
    h1 {
      font-size: 1.2rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #888;
      margin-bottom: 32px;
    }
    .lottie-wrapper {
      position: relative;
      width: 500px;
      max-width: 90vw;
    }
    #lottie-container {
      width: 100%;
      aspect-ratio: 2335 / 1636;
    }
    /* Overlay texte par-dessus l'animation */
    .player-overlay {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: clamp(1.4rem, 4vw, 2.2rem);
      font-weight: 900;
      color: #ffffff;
      -webkit-text-stroke: 10px black;
      paint-order: stroke fill;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s;
      text-align: center;
      white-space: nowrap;
    }
    .player-overlay.visible {
      opacity: 1;
    }
    .buttons {
      display: flex;
      gap: 20px;
      margin-top: 32px;
    }
    button {
      padding: 14px 36px;
      border: none;
      border-radius: 50px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      transition: all 0.2s;
    }
    button:hover {
      transform: scale(1.05);
    }
    button:active {
      transform: scale(0.97);
    }
    #btn1 {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      box-shadow: 0 4px 20px rgba(102,126,234,0.4);
    }
    #btn2 {
      background: linear-gradient(135deg, #f093fb, #f5576c);
      color: white;
      box-shadow: 0 4px 20px rgba(245,87,108,0.4);
    }
    button.active {
      outline: 3px solid white;
      outline-offset: 3px;
    }
  </style>
</head>

      container: document.getElementById('lottie-container'),
      renderer: 'svg',
      loop: false,
      autoplay: false,
      animationData: lottieData
    });

    const overlay = document.getElementById('player-overlay');

    anim.addEventListener('DOMLoaded', () => {
      // Prêt
    });

    function triggerPlayer(name, btn) {
      // Mise à jour du nom
      overlay.textContent = name;
      overlay.classList.add('visible');

      // Reset boutons
      document.querySelectorAll('button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');

      // Relancer l'animation depuis le début à vitesse x2.5 (172 frames / 100fps = 1.72s → ~0.7s)
      anim.stop();
      anim.setSpeed(2.5);
      anim.play();

      // Cacher l'overlay à la fin
      anim.removeEventListener('complete');
      anim.addEventListener('complete', () => {
        overlay.classList.remove('visible');
      });
    }
