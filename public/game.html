<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8" />
  <title>Ulti-mates</title>
  <link rel="stylesheet" href="game.css" />
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.150.1/build/three.module.js"
      }
    }
  </script>
</head>

<body>

  <!-- Statut WebSocket (coin haut gauche) -->
  <div id="connection-status" class="disconnected">Déconnecté</div>

  <!-- HUD jeu (scores + timer) -->
  <div id="hud">
    <!-- Logo gauche (position absolue pour ne pas briser le centrage) -->
    <div id="hud-logo">
      <img src="Img/Tipolino Logo.svg" alt="Tipolino">
    </div>

    <!-- Groupe centré : noms + bloc central -->
    <h2 id="hud-team-a">PIZZAIOLOS</h2>

    <!-- Bloc central score + timer -->
    <div id="hud-center">
      <div id="score-a" class="hud-score">0</div>
      <div id="hud-timer-block">
        <div id="timer">02:20</div>
      </div>
      <div id="score-b" class="hud-score">0</div>
      <div id="hud-scallops">
        <div class="scallop"></div>
        <div class="scallop"></div>
        <div class="scallop"></div>
        <div class="scallop"></div>
        <div class="scallop"></div>
        <div class="scallop"></div>
        <div class="scallop"></div>
      </div>
    </div>

    <!-- Nom équipe B -->
    <h2 id="hud-team-b">CLIENTS</h2>

    <!-- Joueurs (conservés pour le JS, cachés) -->
    <div id="players-a" style="display:none;"></div>
    <div id="players-b" style="display:none;"></div>
  </div>

  <!-- Labels HTML au-dessus des joueurs (positionnés via JS) -->
  <div id="labels-container"></div>

  <!-- Lobby -->
  <div id="lobby-overlay">
    <img id="lobby-logo" src="Img/Tipolino Logo.svg" alt="Tipolino">
    <h3 id="lobby-count">0 joueur(s) connecté(s)</h3>
    <div class="lobby-layout">
      <!-- Tableaux partagés avec manette -->
      <div class="lobby-tables">
        <div class="lobby-col">
          <div class="lobby-header">PIZZAIOLOS</div>
          <div class="lobby-list-container">
            <div id="lobby-team-a" class="lobby-list">
              <div class="lobby-empty">—</div>
            </div>
          </div>
        </div>
        <div class="lobby-col">
          <div class="lobby-header">CLIENTS</div>
          <div class="lobby-list-container">
            <div id="lobby-team-b" class="lobby-list">
              <div class="lobby-empty">—</div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Code QR pour rejoindre, déplacé dans le coin du lobby -->
    <div id="lobby-qr-container">
      <div id="lobby-qr-label">📱 Scanner pour rejoindre</div>
      <div id="lobby-qr-code"></div>
    </div>

    <div class="lobby-hint" style="display: none;">Le host (👑) lance la partie depuis son téléphone</div>
  </div>

  <!-- QR code in-game (coin bas-droite) -->
  <div id="ingame-qr">
    <div id="ingame-qr-label">📱 Rejoindre</div>
    <div id="ingame-qr-code"></div>
  </div>

  <!-- Fin de partie -->
  <div id="end-overlay">
    <div id="end-winner"></div>
    <div class="final-scores">
      <div class="final-score-block">
        <span>Équipe A</span>
        <span id="final-a" style="color:#3498db">0</span>
      </div>
      <div class="final-score-block">
        <span>Équipe B</span>
        <span id="final-b" style="color:#e74c3c">0</span>
      </div>
    </div>
    <button id="restart-btn">🔄 Retour au lobby</button>
  </div>

  <!-- ─── Scripts ─────────────────────────────────────────────── -->

  <!-- QRCode : chargé en global AVANT le module -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

  <!-- Jeu : ES module (Three.js + Rapier via import) -->
  <script type="module" src="game.js"></script>

</body>

</html>
