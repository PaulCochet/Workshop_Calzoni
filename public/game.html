<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8" />
  <title>Ulti-mates</title>
  <link rel="stylesheet" href="game.css" />
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.150.1/build/three.module.js"
      }
    }
  </script>
</head>

<body>

  <!-- Statut WebSocket (coin haut gauche) -->
  <div id="connection-status" class="disconnected">Déconnecté</div>

  <!-- HUD jeu (scores + timer) -->
  <div id="hud">
    <div class="team-block" id="team-a">
      <div class="team-name">ÉQUIPE A</div>
      <div class="team-score" id="score-a">0</div>
      <div class="team-players" id="players-a">—</div>
    </div>
    <div>
      <div id="timer">02:20</div>
    </div>
    <div class="team-block" id="team-b">
      <div class="team-name">ÉQUIPE B</div>
      <div class="team-score" id="score-b">0</div>
      <div class="team-players" id="players-b">—</div>
    </div>
  </div>

  <!-- Labels HTML au-dessus des joueurs (positionnés via JS) -->
  <div id="labels-container"></div>

  <!-- Lobby -->
  <div id="lobby-overlay">
    <h2>🥏 ULTI-MATES</h2>
    <div id="lobby-qr-container">
      <div id="lobby-qr-code"></div>
      <div id="lobby-url-text"></div>
    </div>
    <div id="lobby-count">0 joueur(s) connecté(s)</div>
    <div class="lobby-teams">
      <div class="lobby-team-block">
        <div class="lobby-team-title" id="lobby-title-a">🔵 ÉQUIPE A</div>
        <div id="lobby-team-a"><div class="lobby-empty">—</div></div>
      </div>
      <div class="lobby-team-block">
        <div class="lobby-team-title" id="lobby-title-b">🔴 ÉQUIPE B</div>
        <div id="lobby-team-b"><div class="lobby-empty">—</div></div>
      </div>
    </div>
    <div class="lobby-hint">Le host (👑) lance la partie depuis son téléphone</div>
  </div>

  <!-- QR code in-game (coin bas-droite) -->
  <div id="ingame-qr">
    <div id="ingame-qr-label">📱 Rejoindre</div>
    <div id="ingame-qr-code"></div>
  </div>

  <!-- Fin de partie -->
  <div id="end-overlay">
    <div id="end-winner"></div>
    <div class="final-scores">
      <div class="final-score-block">
        <span>Équipe A</span>
        <span id="final-a" style="color:#3498db">0</span>
      </div>
      <div class="final-score-block">
        <span>Équipe B</span>
        <span id="final-b" style="color:#e74c3c">0</span>
      </div>
    </div>
    <button id="restart-btn">🔄 Retour au lobby</button>
  </div>

  <!-- ─── Scripts ─────────────────────────────────────────────── -->

  <!-- QRCode : chargé en global AVANT le module -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

  <!-- Jeu : ES module (Three.js + Rapier via import) -->
  <script type="module" src="game.js"></script>

</body>
</html>
